defaults:
  - env/wan_libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/openvla_oft@actor.model
  - hybrid_engines/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

# Number of GPUs to use. The default reproduces wan_libero_spatial_grpo_openvlaoft.
# Override with e.g. `n_gpu=4`.
n_gpu: 2  # for test

profile:
  profile_rollout: False
  profile_early_stop: False
  profile_vla_data: False
  profile_acwm_data: False
  profile_data_max_groups: 8
  profile_data_dir: ${runner.logger.log_path}

continuous_batching:
  enabled: False

early_stop_model:
  enabled: False
  checkpoint_path: /mnt/kyliu/code/RLinf/rlinf/models/embodiment/early_stop_model/outputs/run_20260715-080548/ckpt/epoch_000100.pt
  trigger_steps: 64
  threshold: 0.6
  device: cuda

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 6-7  # 0-${subtract:${n_gpu},1}  # for test

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "wan_libero_spatial_grpo_openvlaoft_ngpu"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 50  # for test
  max_steps: -1

  only_eval: True  # for test
  val_check_interval: -1  # -1  # for test
  save_interval: -1  # 5  # for test

  resume_dir: null # Optional: path to a saved checkpoint directory, such as 'checkpoints/global_step_10'. If not None, it will be used to resume training.
  ckpt_path: /mnt/kyliu/code/RLinf/logs/20260718-10:26:10-wan_libero_spatial_grpo_openvlaoft_ngpu/wan_libero_spatial_grpo_openvlaoft_ngpu/checkpoints/global_step_10/actor/model_state_dict/full_weights.pt  # null  # Optional: path to a .pt checkpoint. If not None, it will be loaded after the model is instantiated (for evaluation).

algorithm:
  normalize_advantages: True
  kl_penalty: kl  # how to estimate kl divergence: kl or kl_penalty
  group_size: 8

  reward_type: action_level  # action_level or chunk_level
  logprob_type: token_level
  entropy_type: token_level

  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  reward_coef: 5.0

  filter_rewards: True
  rewards_lower_bound: 0.5
  rewards_upper_bound: 4.5

env:
  group_name: "EnvGroup"

  # Scaled from the default 8-GPU config:
  # - train envs per GPU: 64 / 8 = 8
  # - eval envs per GPU: 496 / 8 = 62
  train:
    rollout_epoch: 16  # for test
    total_num_envs: ${multiply:8,${n_gpu}}
    group_size: ${algorithm.group_size}
    max_episode_steps: 256 # max episode steps for truncation
    max_steps_per_rollout_epoch: 256
    reward_coef: ${algorithm.reward_coef}
    reset_gripper_open: True
    profile: ${profile}
    continuous_batching: ${continuous_batching}
    wan_wm_hf_ckpt_path: "/mnt/data/rlinf/checkpoints/RLinf-Wan-LIBERO-Spatial"  # NOTE: need check before running
    enable_offload: True # otherwise, may OOM
    video_cfg:
      save_video: False # RecordVideo does not forward offload for WanEnv.
    num_inference_steps: 5 # default 5, can be set to 3 or 1 for faster inference, but lower quality
  eval:
    rollout_epoch: 4
    total_num_envs: ${multiply:16,${n_gpu}} # default 496 when n_gpu=8  # for test
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 512
    max_steps_per_rollout_epoch: 512
    group_size: 1
    reset_gripper_open: True
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  sampling_params:
    do_sample: True
    temperature_train: 1.6
    temperature_eval: 1.6
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0

  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1

  model:
    model_path: "/mnt/data/rlinf/checkpoints/Openvla-oft-SFT-libero-spatial-traj1"  # NOTE: need check before running
    precision: ${actor.model.precision}

    # settings for only_eval mode
    model_type: ${actor.model.model_type}
    implement_version: ${actor.model.implement_version}
    value_type: ${actor.model.value_type}
    action_dim: ${actor.model.action_dim}
    num_action_chunks: ${actor.model.num_action_chunks}
    use_proprio: ${actor.model.use_proprio}
    use_film: ${actor.model.use_film}
    unnorm_key: ${actor.model.unnorm_key}
    center_crop: ${actor.model.center_crop}
    max_prompt_length: ${actor.model.max_prompt_length}
    vocab_size: ${actor.model.vocab_size}
    hidden_size: ${actor.model.hidden_size}
    add_value_head: ${actor.model.add_value_head}
    image_size: ${actor.model.image_size}
    is_lora: ${actor.model.is_lora}
    lora_rank: ${actor.model.lora_rank}
    lora_path: ${actor.model.lora_path}
    num_images_in_input: ${actor.model.num_images_in_input}
    attn_implementation: ${actor.model.attn_implementation}
    low_cpu_mem_usage: ${actor.model.low_cpu_mem_usage}
    trust_remote_code: ${actor.model.trust_remote_code}
    policy_setup: ${actor.model.policy_setup}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  # Scaled from the default 8-GPU config: 8192 / 8 = 1024 samples per GPU.
  global_batch_size: ${multiply:1024,${n_gpu}}  # for test
  seed: 1234
  enable_offload: True

  # Override the default values in model/openvla_oft
  model:
    model_path: "/mnt/data/rlinf/checkpoints/Openvla-oft-SFT-libero-spatial-traj1"  # NOTE: need check before running
    model_type: "openvla_oft"

    unnorm_key: libero_spatial_no_noops
    max_prompt_length: 128

    # LORA
    is_lora: False  # for test
    lora_rank: 32
    lora_path: null

  optim:
    lr: 2.0e-5
    value_lr: 3.0e-3
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0

  # Override the default values in hybrid_engines/fsdp
  fsdp_config:
    strategy: "fsdp"
    gradient_checkpointing: True
    save_full_model_weights: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
